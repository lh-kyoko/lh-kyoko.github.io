<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Apps - Life Hack Tools</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      min-height: 100vh;
      background: linear-gradient(180deg, #8a1f1f 0%, #2d0a0a 100%);
      color: #f5e6e6;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 60px 20px;
    }
    .container { max-width: 500px; width: 100%; }
    .back { color: #f5c6c6; text-decoration: none; font-size: 14px; margin-bottom: 32px; display: inline-block; }
    .back:hover { color: #fff; }
    h1 { font-size: 32px; font-weight: 800; margin-bottom: 32px; }
    .app-card {
      background: rgba(255,255,255,0.08);
      border-radius: 12px;
      padding: 20px 24px;
      margin-bottom: 16px;
      text-decoration: none;
      color: inherit;
      display: flex;
      align-items: center;
      gap: 18px;
      transition: background 0.2s;
    }
    .app-card:hover { background: rgba(255,255,255,0.14); }
    .app-card img {
      width: 64px; height: 64px;
      border-radius: 14px;
      flex-shrink: 0;
    }
    .app-card .no-icon {
      width: 64px; height: 64px;
      border-radius: 14px;
      flex-shrink: 0;
      background: rgba(255,255,255,0.1);
      display: flex; align-items: center; justify-content: center;
      font-size: 28px;
    }
    .app-card .info { text-align: left; }
    .app-card h2 { font-size: 18px; font-weight: 700; margin-bottom: 4px; }
    .app-card p { font-size: 13px; color: #d4a0a0; line-height: 1.5; }
  </style>
</head>
<body>
  <div class="container">
    <a href="/" class="back">&larr; Back to Home</a>
    <h1>Apps</h1>

    <a href="/apps/stockhome" class="app-card">
      <img src="/assets/icon-stockhome.png" alt="StockHome">
      <div class="info">
        <h2>StockHome</h2>
        <p>家庭の在庫管理アプリ。食品・日用品・薬の残量を把握し、家族と共有。買い忘れを防止します。</p>
      </div>
    </a>
    <a href="/apps/mahjong-cho" class="app-card">
      <img src="/assets/icon-mahjong-cho.png" alt="麻雀帖">
      <div class="info">
        <h2>麻雀帖</h2>
        <p>麻雀スコア記録アプリ。対局結果をかんたんに記録・分析できます。</p>
      </div>
    </a>
    <a href="/apps/life-calendar" class="app-card">
      <img src="/assets/icon-life-calendar.png" alt="Life Calendar">
      <div class="info">
        <h2>Life Calendar</h2>
        <p>人生を週単位で可視化するカレンダー。残りの時間を意識して、毎週を大切に過ごそう。</p>
      </div>
    </a>
    <a href="/apps/todo-box" class="app-card">
      <img src="/assets/icon-todo-box.png" alt="TodoBox">
      <div class="info">
        <h2>TodoBox</h2>
        <p>シンプルなタスク管理アプリ。余計な機能のない、やることリスト。</p>
      </div>
    </a>
  </div>
</body>
</html>
