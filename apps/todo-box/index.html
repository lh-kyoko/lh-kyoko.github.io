<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TodoBox - Life Hack Tools</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      min-height: 100vh;
      background: linear-gradient(180deg, #8a1f1f 0%, #2d0a0a 100%);
      color: #f5e6e6;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 60px 20px;
    }
    .container { max-width: 600px; width: 100%; }
    .back { color: #f5c6c6; text-decoration: none; font-size: 14px; margin-bottom: 32px; display: inline-block; }
    .back:hover { color: #fff; }
    h1 { font-size: 32px; font-weight: 800; margin-bottom: 8px; }
    .subtitle { font-size: 16px; color: #d4a0a0; margin-bottom: 32px; }
    .section { background: rgba(255,255,255,0.08); border-radius: 12px; padding: 28px; margin-bottom: 20px; }
    .section h2 { font-size: 18px; font-weight: 700; margin-bottom: 12px; }
    .section p, .section li { font-size: 15px; color: #d4a0a0; line-height: 1.7; }
    .section ul { list-style: none; padding: 0; }
    .section ul li::before { content: "・"; }
    .stores { display: flex; gap: 16px; flex-wrap: wrap; margin-top: 24px; justify-content: center; align-items: center; }
    .stores a { transition: opacity 0.2s; }
    .stores a:hover { opacity: 0.8; }
    .stores img { height: 50px; }
  </style>
</head>
<body>
  <div class="container">
    <a href="/" class="back">&larr; Back to Home</a>
    <h1>TodoBox</h1>
    <p class="subtitle">シンプルなタスク管理アプリ</p>

    <div class="section">
      <h2>概要</h2>
      <p>
        TodoBoxは、シンプルさにこだわったタスク管理アプリです。
        複雑な機能は一切なし。タスクを追加して、終わったらチェック。それだけ。
      </p>
    </div>

    <div class="section">
      <h2>機能</h2>
      <ul>
        <li>すばやいタスク追加</li>
        <li>シンプルなチェックオフ</li>
        <li>無駄のないデザイン</li>
        <li>軽量・高速</li>
      </ul>
    </div>

    <div class="stores">
      <a href="#"><img src="/assets/app-store-badge.svg" alt="Download on the App Store"></a>
      <a href="#"><img src="/assets/google-play-badge.png" alt="Get it on Google Play"></a>
    </div>
  </div>
</body>
</html>
