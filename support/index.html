<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Support - Life Hack Tools</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      min-height: 100vh;
      background: linear-gradient(180deg, #8a1f1f 0%, #2d0a0a 100%);
      color: #f5e6e6;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 60px 20px;
    }
    .container {
      max-width: 600px;
      width: 100%;
    }
    .back {
      color: #f5c6c6;
      text-decoration: none;
      font-size: 14px;
      margin-bottom: 32px;
      display: inline-block;
    }
    .back:hover { color: #fff; }
    h1 {
      font-size: 32px;
      font-weight: 800;
      margin-bottom: 32px;
    }
    .section {
      background: rgba(255,255,255,0.08);
      border-radius: 12px;
      padding: 28px;
      margin-bottom: 20px;
    }
    .section h2 {
      font-size: 18px;
      font-weight: 700;
      margin-bottom: 12px;
    }
    .section p {
      font-size: 15px;
      color: #d4a0a0;
      line-height: 1.7;
    }
    .section a {
      color: #f5c6c6;
      text-decoration: underline;
    }
    .section a:hover { color: #fff; }
  </style>
</head>
<body>
  <div class="container">
    <a href="/" class="back">&larr; ホームに戻る</a>
    <h1>サポート</h1>

    <div class="section">
      <h2>お問い合わせ</h2>
      <p>
        ご質問・不具合の報告・ご要望などは、以下のメールアドレスまでお気軽にどうぞ。<br>
        <a href="mailto:info@lh.tools">info@lh.tools</a>
      </p>
    </div>

    <div class="section">
      <h2>よくある質問</h2>
      <p>
        <strong>Q: データは端末間で同期されますか？</strong><br>
        はい。インターネット接続時に自動で同期されます。オフラインでも使用でき、接続が復帰すると同期されます。
      </p>
      <br>
      <p>
        <strong>Q: データを削除したいのですが？</strong><br>
        <a href="mailto:info@lh.tools">info@lh.tools</a> までご連絡ください。対応いたします。
      </p>
    </div>
  </div>
</body>
</html>
